services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: muhasebe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-muhasebe}
      POSTGRES_DB: muhasebe
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    # Postgres yalnızca Docker ağından erişilir; host'a 5432 yayınlanmaz (port çakışması olmaz)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muhasebe -d muhasebe"]
      interval: 5s
      timeout: 5s
      retries: 8

  app:
    build: .
    restart: unless-stopped
    # Host 3006 → konteyner 3000 (sunucuda 3000 dolu; .env APP_PORT kullanılmaz — sabit)
    ports:
      - "3006:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: muhasebe
      PGUSER: muhasebe
      PGPASSWORD: ${POSTGRES_PASSWORD:-muhasebe}
      # .env: COOKIE_SECURE=true (HTTPS üretim), false (yerel HTTP)
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_SECRET: ${SESSION_SECRET:-muhasebe-uretimde-degistirin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
