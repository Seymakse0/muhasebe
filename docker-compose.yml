services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: muhasebe
      POSTGRES_PASSWORD: muhasebe
      POSTGRES_DB: muhasebe
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muhasebe -d muhasebe"]
      interval: 5s
      timeout: 5s
      retries: 8

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: muhasebe
      PGUSER: muhasebe
      PGPASSWORD: muhasebe
      # http://localhost için çerez Secure olmamalı
      COOKIE_SECURE: "false"
      SESSION_SECRET: "${SESSION_SECRET:-muhasebe-uretimde-degistirin}"
      # Boş bırakılırsa authSetup varsayılan admin123 kullanır; sorun olursa: npm run reset-admin
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
