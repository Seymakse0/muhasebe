<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş — Stok sayımı</title>
  <link rel="stylesheet" href="voyage-design-system.css" />
  <style>
    body.no-sidebar { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card { width: 100%; max-width: 400px; }
  </style>
</head>
<body class="no-sidebar">
  <div class="card login-card">
    <div class="sidebar-brand" style="border: none; padding: 0 0 20px;">
      <div class="brand-mark">V</div>
      <div>
        <div class="brand-name">VOYAGE <span>HOTELS</span></div>
        <div class="brand-sub">Stok sayımı — giriş</div>
      </div>
    </div>
    <form id="loginForm">
      <div class="form-group mb-16">
        <label class="form-label" for="username">Kullanıcı adı</label>
        <input type="text" class="form-input" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="form-group mb-20">
        <label class="form-label" for="password">Şifre</label>
        <input type="password" class="form-input" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">Giriş</button>
    </form>
    <p id="loginErr" class="mt-16" style="color: var(--red); font-size: 13px; display: none;"></p>
  </div>
  <script type="module" src="login-app.js"></script>
</body>
</html>
